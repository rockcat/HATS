<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header>
    <h1>Team Dashboard
    </h1>
    <div class="project-selector">
      <h1>Project:</h1>
      <span class="project-badge-wrap">
        <button id="project-badge" class="project-badge" title="Click to switch project"></button>
        <div id="project-switcher" class="project-switcher" hidden>
          <div class="project-switcher-new">
            <input type="text" id="project-switcher-input" class="project-switcher-input"
                   placeholder="Project name or new id…" spellcheck="false" autocomplete="off">
            <button id="project-switcher-load" class="project-switcher-load-btn">Load</button>
          </div>
          <div id="project-switcher-list" class="project-switcher-list"></div>
        </div>
      </span>
    </div>
    <button id="new-ticket-btn" class="header-btn" title="Create a new ticket">+ New Ticket</button>
    <button id="debug-log-btn" class="header-btn header-btn--ghost" title="Toggle prompt logging to console">Debug</button>
    <button id="settings-btn" class="header-btn header-btn--icon" title="Settings">⚙</button>
    <div id="connection-status" class="status-dot" title="Disconnected"></div>
  </header>

  <main>

    <!-- Top-left: Agents -->
    <section id="agents-panel">
      <div class="panel-header panel-header--agents">
        Agents
        <button id="add-agent-btn" class="panel-add-btn" title="Add new agent">+ Agent</button>
      </div>
      <div id="agents-container">
        <svg id="comms-overlay" aria-hidden="true"></svg>
      </div>
    </section>

    <!-- Bottom-left: Tools & MCP -->
    <section id="tools-panel">
      <div class="panel-header panel-header--tabs">
        <button class="panel-tab active" data-tab="tools">Tools</button>
        <button class="panel-tab" data-tab="mcp">MCP Servers</button>
        <button class="panel-tab" data-tab="cli">CLI</button>
      </div>
      <div id="tools-content" class="tab-pane active"></div>
      <div id="mcp-content" class="tab-pane"></div>
      <div id="cli-content" class="tab-pane">
        <div id="cli-output"></div>
        <div id="cli-input-row">
          <span class="cli-prompt">&gt;</span>
          <input type="text" id="cli-input" placeholder="Type a command or message…" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </section>

    <!-- Top-right: Active kanban columns -->
    <section id="kanban-active">
      <div class="kanban-col" id="col-ready">
        <div class="kanban-col-header">
          <span class="kanban-col-label col-ready">Ready</span>
          <span class="kanban-col-count"></span>
        </div>
        <div class="task-list"></div>
      </div>
      <div class="kanban-col" id="col-in_progress">
        <div class="kanban-col-header">
          <span class="kanban-col-label col-in_progress">In Progress</span>
          <span class="kanban-col-count"></span>
        </div>
        <div class="task-list"></div>
      </div>
      <div class="kanban-col" id="col-blocked">
        <div class="kanban-col-header">
          <span class="kanban-col-label col-blocked">Blocked</span>
          <span class="kanban-col-count"></span>
        </div>
        <div class="task-list"></div>
      </div>
      <div class="kanban-col" id="col-completed">
        <div class="kanban-col-header">
          <span class="kanban-col-label col-completed">Done</span>
          <span class="kanban-col-count"></span>
        </div>
        <div class="task-list"></div>
      </div>
    </section>

    <!-- Bottom-right: Backlog / Calendar -->
    <section id="backlog-panel">
      <div class="panel-header panel-header--tabs">
        <button class="backlog-tab active" data-btab="backlog">Backlog <span id="backlog-count"></span></button>
        <button class="backlog-tab" data-btab="calendar">Calendar</button>
        <div id="cal-nav" class="cal-nav" hidden>
          <button id="cal-prev" class="cal-nav-btn" title="Previous">‹</button>
          <span id="cal-period"></span>
          <button id="cal-next" class="cal-nav-btn" title="Next">›</button>
        </div>
        <div id="cal-view-tabs" class="cal-view-tabs" hidden>
          <button class="cal-view-btn active" data-view="week">Week</button>
          <button class="cal-view-btn" data-view="day">Day</button>
          <button class="cal-view-btn" data-view="agenda">Agenda</button>
        </div>
        <button id="new-meeting-btn" class="panel-add-btn" hidden>+ Meeting</button>
      </div>
      <div id="backlog-list" class="btab-pane active"></div>
      <div id="calendar-pane" class="btab-pane" hidden></div>
    </section>

  </main>

  <!-- Agent detail drawer -->
  <div id="agent-detail" class="agent-detail" hidden>
    <div class="agent-detail-header">
      <div class="agent-detail-identity">
        <span id="agent-detail-name"></span>
        <span id="agent-detail-hat"></span>
      </div>
      <button id="agent-remove-btn" class="agent-remove-btn" title="Remove agent">Remove</button>
      <button id="agent-detail-close" class="modal-close" title="Close">✕</button>
    </div>
    <div class="agent-config-row">
      <div class="agent-config-line">
        <select id="agent-config-hat" class="agent-config-select" title="Hat type">
          <option value="white">White — Facts</option>
          <option value="red">Red — Emotion</option>
          <option value="black">Black — Caution</option>
          <option value="yellow">Yellow — Optimism</option>
          <option value="green">Green — Creativity</option>
          <option value="blue">Blue — Process</option>
        </select>
        <select id="agent-config-avatar" class="agent-config-select agent-config-avatar-select" title="Avatar"></select>
      </div>
      <div class="agent-config-line">
        <select id="agent-config-provider" class="agent-config-select"></select>
        <select id="agent-config-model"    class="agent-config-select agent-config-model-select"></select>
        <button id="agent-config-apply" class="agent-config-btn">Apply</button>
      </div>
    </div>
    <div id="avatar-panel" class="avatar-panel" hidden>
      <canvas id="avatar-canvas" class="avatar-canvas"></canvas>
    </div>
    <div id="agent-detail-feed" class="agent-detail-feed"></div>
  </div>

  <!-- Edit Ticket Modal -->
  <div id="ticket-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span id="modal-ticket-id" class="modal-ticket-id"></span>
        <button class="modal-close" id="modal-close" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-group">
          <label class="field-label">Title</label>
          <input type="text" id="edit-title" class="modal-input">
        </div>
        <div class="field-group">
          <label class="field-label">Description</label>
          <textarea id="edit-description" class="modal-textarea" rows="7"></textarea>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Priority</label>
            <select id="edit-priority" class="modal-select">
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Column</label>
            <select id="edit-column" class="modal-select">
              <option value="backlog">Backlog</option>
              <option value="ready">Ready</option>
              <option value="in_progress">In Progress</option>
              <option value="blocked">Blocked</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Assignee</label>
            <input type="text" id="edit-assignee" class="modal-input">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Tags <span class="field-hint">(comma-separated)</span></label>
          <input type="text" id="edit-tags" class="modal-input">
        </div>
        <div class="field-group" id="modal-activity-section">
          <label class="field-label">Activity</label>
          <div id="modal-comments"></div>
          <div class="modal-comment-input-row">
            <input type="text" id="modal-comment-text" class="modal-input" placeholder="Add a comment…">
            <button class="modal-btn secondary" id="modal-comment-submit">Post</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span id="modal-error" class="modal-error"></span>
        <button class="modal-btn secondary" id="modal-cancel">Cancel</button>
        <button class="modal-btn primary" id="modal-save">Save changes</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay" hidden>
    <div class="modal settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-header">
        <span id="settings-title" class="modal-ticket-id">Settings</span>
        <button class="modal-close" id="settings-close" title="Close">✕</button>
      </div>
      <div class="modal-body settings-body" id="settings-body">
        <p class="settings-loading">Loading…</p>
      </div>
      <div class="modal-footer">
        <span id="settings-msg" class="settings-msg"></span>
        <button class="modal-btn secondary" id="settings-cancel">Cancel</button>
        <button class="modal-btn primary" id="settings-save">Save changes</button>
      </div>
    </div>
  </div>

  <!-- Add Agent Modal -->
  <div id="add-agent-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-ticket-id">Add Agent</span>
        <button class="modal-close" id="add-agent-close" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Name</label>
            <input type="text" id="add-agent-name" class="modal-input" placeholder="e.g. Taylor">
          </div>
          <div class="field-group">
            <label class="field-label">Hat</label>
            <select id="add-agent-hat" class="modal-select">
              <option value="white">White — Facts</option>
              <option value="red">Red — Emotion</option>
              <option value="black">Black — Caution</option>
              <option value="yellow">Yellow — Optimism</option>
              <option value="green">Green — Creativity</option>
              <option value="blue">Blue — Process</option>
            </select>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Specialisation <span class="field-hint">(optional)</span></label>
          <input type="text" id="add-agent-specialisation" class="modal-input" placeholder="e.g. financial analysis">
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Provider</label>
            <select id="add-agent-provider" class="modal-select"></select>
          </div>
          <div class="field-group">
            <label class="field-label">Model</label>
            <select id="add-agent-model" class="modal-select"></select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <span id="add-agent-error" class="modal-error"></span>
        <button class="modal-btn secondary" id="add-agent-cancel">Cancel</button>
        <button class="modal-btn primary" id="add-agent-save">Add Agent</button>
      </div>
    </div>
  </div>

  <!-- New Meeting Modal -->
  <div id="new-meeting-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <span class="modal-ticket-id">Schedule Meeting</span>
        <button class="modal-close" id="new-meeting-close" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Type</label>
            <select id="meeting-type" class="modal-select">
              <option value="standup">Standup</option>
              <option value="sprint_planning">Sprint Planning</option>
              <option value="retro">Retrospective</option>
              <option value="review">Review</option>
              <option value="ad_hoc">Ad Hoc</option>
            </select>
          </div>
          <div class="field-group">
            <label class="field-label">Facilitator</label>
            <select id="meeting-facilitator" class="modal-select"></select>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Topic</label>
          <input type="text" id="meeting-topic" class="modal-input" placeholder="e.g. Sprint 3 Planning">
        </div>
        <div class="field-group">
          <label class="field-label">Agenda <span class="field-hint">(optional)</span></label>
          <textarea id="meeting-agenda" class="modal-textarea" rows="3" placeholder="Key points to cover…"></textarea>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label class="field-label">Date &amp; Time</label>
            <input type="datetime-local" id="meeting-datetime" class="modal-input">
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Participants <span class="field-hint">(select all that apply)</span></label>
          <div id="meeting-participants" class="meeting-participants-grid"></div>
        </div>
      </div>
      <div class="modal-footer">
        <span id="new-meeting-error" class="modal-error"></span>
        <button class="modal-btn secondary" id="new-meeting-cancel">Cancel</button>
        <button class="modal-btn primary" id="new-meeting-save">Schedule</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="app.js"></script>
  <script type="module" src="avatar.js"></script>
</body>
</html>
